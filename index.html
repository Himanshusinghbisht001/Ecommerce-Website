<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce website</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ? Header Section -->
    <header class="headerSection">
      <!-- ? SubHeader page -->
      <div class="subheader">
        <p>Free shipping 30-day return or refund guarantee.</p>
        <div class="signs">
          <a class="sign" id="signIn" href="signIn.html">SIGN IN</a>
          <a class="sign" id="signUp" href="singOut.html">SIGN UP</a>
        </div>
      </div>

      <!-- ? Header Page -->
      <div class="header">
        <div class="headerTextContainer">
          <h1>Gadget Galaxy</h1>
          <nav class="navBar">
            <a class="navOption" href="#">HOME</a>
            <a class="navOption" href="#">SHOP</a>
            <a class="navOption" href="#">ABOUT</a>
            <a class="navOption" href="#">CONTACT</a>
            <a class="navOption" href="#"
              ><i class="fa-solid fa-cart-shopping"> <span>0</span></i></a
            >
          </nav>
        </div>
      </div>
    </header>

    <!-- ? Main Page -->
    <div class="mainPage">
      <div class="mainPageContainer">
        <div class="mainLeft">
          <div class="mainLeftHeading">
            <p>
              Explore the Latest in
              <span style="color: #d6ff41"> Tech </span>Industries
            </p>
            <h1>Your Destination</h1>
            <h1>for Cutting-Edge</h1>
            <h1>Gadgets!</h1>
          </div>

          <a class="shopPage" href="#"
            >SHOP NOW <i class="fa-solid fa-arrow-trend-up"></i
          ></a>
        </div>
        <div class="mainRight">
          <img src="./public/download__1_-removebg-preview.png" alt="" />
        </div>
      </div>
    </div>

    <!-- ? Page 2 -->
    <div class="page_two">
      <div class="page_twoTextContainer">
        <h1>Featured Products</h1>
        <a class="seeProduct" href="#"> See All Products</a>
      </div>

      <!--? Productor Container -->
      <section class="prosuctSection">
        <div class="productContainer"></div>
      </section>

      <!-- ? Product Template -->
      <template class="productTemplate">
        <div class="productCart">
          <p class="productCategory"></p>
          <div class="imageContainer">
            <img class="productImage" src="" alt="">
          </div>
          <div class="productInformation">
            <h2 class="productName"></h2>
            <div class="productStar">
              <i id="star" class="fa-solid fa-star"></i>
              <i id="star" class="fa-solid fa-star"></i>
              <i id="star" class="fa-solid fa-star"></i>
              <i id="star" class="fa-solid fa-star"></i>
              <i id="star" class="fa-solid fa-star"></i>
            </div>
            <p class="productDecribion"></p>
          </div>
          <div class="productPrice">
            <p class="orignalPrice"></p>
            <p class="selaingPrice" style="text-decoration: line-through"></p>
          </div>
          <div class="quantityStock">
            <p>
              Total Stocks Available : <span class="availableStock"></span>
            </p>
            <div class="quantitySec">
              <p>Quantity(Pieces)</p>
              <div class="priceButton">
                <button class="add">+</button>
                <p class="value">0</p>
                <button class="subtract">-</button>
              </div>
            </div>

            <button class="addtocartBtn">Add To Cart</button>
          </div>
        </div>
      </template>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollToPlugin.min.js"
      integrity="sha512-kz526itdNcpyMs18TLPOhsnIeOIO1JywWKbbF77zR+ZKpZ4gwubXhwaURHpt5Se9AAqSK2j8ID0LnfXsB2Jkjg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
