<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="singOutPage">
      <div class="singOutBox">
        <div class="singInTextContainer">
          <h2>Create Account</h2>
          <p>
            Fill your informaation below and register <br />
            with your social account
          </p>
        </div>
        <div class="signInputBox">
          <div class="nameBox">
            <i class="fa-solid fa-address-card"></i>
            <input type="text" class="name" placeholder="Enter Your Name" />
          </div>

          <div class="emailAddressBox">
            <i id="email" class="fa-solid fa-envelope"></i>
            <input
              type="text"
              class="emailAddress"
              placeholder="Email Address"
            />
          </div>
          <div class="passwoedBox">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              class="emailPasswoed"
              placeholder="Password"
            />
          </div>
        </div>
        <p class="f">Agree with <a class="terms" href="#">Terms & Condition</a>  <input type="checkbox" class="checkbox"></p>
        <button class="signUp">signUp</button>

        <div class="otherOption">
          <div class="googleBox">
            <i class="fa-brands fa-google"></i>
            <a class="Google" href="#"> Continue with Google</a>
          </div>

          <div class="facebookBox">
            <i class="fa-brands fa-facebook-f"></i>
            <a class="FaceBook" href="#"> Continue with FaceBook</a>
          </div>

          <div class="XBox">
            <i class="fa-brands fa-x-twitter"></i>
            <a class="X" href="#"> Continue with X</a>
          </div>

          <div class="appleBox">
            <i class="fa-solid fa-apple-whole"></i>
            <a class="Apple" href="#"> Continue with Apple</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
